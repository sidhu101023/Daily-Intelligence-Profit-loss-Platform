<!DOCTYPE html>
<html lang="en">
<head>
    <title>Records</title>

    <link rel="stylesheet" href="CSS/style.css">
    <link rel="stylesheet" href="CSS/records.css">

    <!-- CHART JS -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">

    <div class="logo-details">
        <div class="logo">Sahayak</div>

        <span class="logo-image">
            <img src="logo-image.jpeg" alt="Logo">
        </span>
    </div>

    <ul class="nav-links">
        <li><a href="adddata.html">Add Data</a></li>
        <li><a href="records.html">Records</a></li>
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="prediction.html">Prediction</a></li>
        <li><a href="analysis.html">Analysis</a></li>
        <li><a href="profile.html">Profile</a></li>
    </ul>

</nav>

<!-- BUSINESS NAVBAR -->
<div class="business-navbar">
    <div id="businessTabs"></div>
</div>

<div class="container">

    <!-- TITLE -->
    <div class="records-header">

        <h2>Financial Records</h2>

        <!-- FILTER -->
        <div class="filter-box">

            <!-- YEAR -->
            <select id="yearFilter">

            </select>

            <!-- MONTH -->
            <select id="monthFilter">

                <option value="0">January</option>
                <option value="1">February</option>
                <option value="2">March</option>
                <option value="3">April</option>
                <option value="4">May</option>
                <option value="5">June</option>
                <option value="6">July</option>
                <option value="7">August</option>
                <option value="8">September</option>
                <option value="9">October</option>
                <option value="10">November</option>
                <option value="11">December</option>

            </select>

            <button onclick="applyFilter()">
                Filter
            </button>

        </div>

    </div>



    <!-- MAIN LAYOUT -->
    <div class="records-layout">

        <!-- LEFT SIDE -->
        <div class="left-section">

            <!-- TOP 3 INCOME -->
            <div class="small-table-card">

                <h3>
                    Top 3 Incomes
                </h3>

                <table class="small-table">

                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Income</th>
                        </tr>
                    </thead>

                    <tbody id="topIncomeTable">

                    </tbody>

                </table>

            </div>



            <!-- TOP 3 EXPENSE -->
            <div class="small-table-card">

                <h3>
                    Top 3 Expenses
                </h3>

                <table class="small-table">

                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Expense</th>
                        </tr>
                    </thead>

                    <tbody id="topExpenseTable">

                    </tbody>

                </table>

            </div>

        </div>



        <!-- CENTER MAIN TABLE -->
        <div class="center-section">

            <div class="table-wrapper">

                <table class="records-table">

                    <thead>

                        <tr>
                            <th>Date</th>
                            <th>Income</th>
                            <th>Expense</th>
                            <th>Profit</th>
                            <th>Loss</th>
                        </tr>

                    </thead>

                    <tbody id="recordsTable">

                    </tbody>

                </table>

            </div>

        </div>



        <!-- RIGHT SIDE CHARTS -->
        <div class="right-section">

            <!-- MONTH PIE -->
            <div class="chart-card">

                <h3>
                    Monthly Profit vs Loss
                </h3>

                <canvas id="monthChart">

                </canvas>

            </div>



            <!-- YEAR PIE -->
            <div class="chart-card">

                <h3>
                    Yearly Profit vs Loss
                </h3>

                <canvas id="yearChart">

                </canvas>

            </div>

        </div>

    </div>

</div>



<script src="JS/business.js"></script>
<script src="JS/records.js"></script>

</body>
</html>
