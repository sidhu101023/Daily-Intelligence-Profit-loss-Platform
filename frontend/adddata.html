<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="CSS/style.css">
    <link rel="stylesheet" href="CSS/adddata.css">
</head>
<body>
<nav class="navbar">
    <div class="logo-details">
    <div class="logo">Sahayak</div>
    <span class="logo-image"><img src="logo-image.jpeg" alt="Logo"></span>
    </div>
    <ul class="nav-links">
        <li><a href="adddata.html">Add Data</a></li>
        <li><a href="records.html">Records</a></li>
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="prediction.html">Prediction</a></li>
        <li><a href="analysis.html">Analysis</a></li>
        <li><a href="profile.html">Profile</a></li>
    </ul>
</nav>
<div class="business-navbar">
    <div id="businessTabs"></div>
</div>
<div class="container">

    <h2>Add Income/Expense</h2>

    <!-- DATE -->
    <label>Date:</label>
    <input type="date" id="dateInput">

    <!-- SELECT TYPE -->
    <select id="typeSelect" onchange="toggleForm()">
        <option value="">Select Type</option>
        <option value="income">Income</option>
        <option value="expense">Expense</option>
    </select>

    <!-- INCOME CARD -->
    <div id="incomeCard" class="card hidden">
        <h3>Daily Income</h3>

        <input type="text" id="incomeDesc" placeholder="Source/Description">
        <input type="number" id="incomeAmount" placeholder="Amount">
        <button type="button" onclick="addIncome()">Save Income</button>
    </div>

    <!-- EXPENSE CARD -->
    <div id="expenseCard" class="card hidden">
        <h3>Daily Expense</h3>

        <input type="text" id="expenseDesc" placeholder="Description">
        <input type="number" id="expenseAmount" placeholder="Amount">
        <button type="button" onclick="addExpense()">Save Expense</button>
    </div>

</div>
<script src="JS/business.js"></script>
<script src="JS/adddata.js"></script>

</body>
</html>
